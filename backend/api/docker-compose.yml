services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: librarydb
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./
    env_file:
      - .env
    environment:
      PGHOST: db
      PGPORT: 5432
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  db_data:
